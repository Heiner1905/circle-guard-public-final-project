spring:
  application:
    name: circleguard-gateway-service
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: "my-super-secret-dev-key-32-chars-long-12345678"
  expiration: 3600000

qr:
  secret: "my-qr-secret-key-for-dev-1234567890"
  expiration: 300

server:
  port: 8087

# Actuator + Micrometer (US-10) ---------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  prometheus:
    metrics:
      export:
        enabled: true
  # Tracing (US-12) ---------------------------------------------------------
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://jaeger-collector.circleguard-observability:4318/v1/traces}

# Business-metric simulator (US-10) -----------------------------------------
circleguard:
  metrics:
    simulation:
      enabled: ${CIRCLEGUARD_METRICS_SIMULATION_ENABLED:false}
      interval-ms: 30000

# Logging (US-11) -----------------------------------------------------------
logging:
  level:
    root: INFO
    com.circleguard: INFO
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}] "
