spring:
  application:
    name: circleguard-file-service

# Placeholder for S3/MinIO configuration if needed later
# aws:
#   s3:
#     endpoint: http://localhost:9000
#     access-key: minioadmin
#     secret-key: minioadmin

server:
  port: 8085

# Actuator + Micrometer (US-10) ---------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  prometheus:
    metrics:
      export:
        enabled: true
  # Tracing (US-12) ---------------------------------------------------------
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://jaeger-collector.circleguard-observability:4318/v1/traces}

# Logging (US-11) -----------------------------------------------------------
logging:
  level:
    root: INFO
    com.circleguard: INFO
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}] "
