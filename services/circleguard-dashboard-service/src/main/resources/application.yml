spring:
  application:
    name: circleguard-dashboard-service
  datasource:
    url: jdbc:postgresql://localhost:5432/circleguard_dashboard
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8084

# Actuator + Micrometer (US-10) ---------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  prometheus:
    metrics:
      export:
        enabled: true

circleguard:
  promotion-service:
    url: ${CIRCLEGUARD_PROMOTION_SERVICE_URL:http://circleguard-promotion-service:8088}

# Logging (US-11) -----------------------------------------------------------
logging:
  level:
    root: INFO
    com.circleguard: INFO
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}] "
