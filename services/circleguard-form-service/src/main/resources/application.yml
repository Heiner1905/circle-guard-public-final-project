spring:
  application:
    name: circleguard-form-service
  datasource:
    url: jdbc:postgresql://localhost:5432/circleguard_form
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8086

# Actuator + Micrometer (US-10) ---------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  prometheus:
    metrics:
      export:
        enabled: true
  # Tracing (US-12) ---------------------------------------------------------
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://jaeger-collector.circleguard-observability:4318/v1/traces}

# Logging (US-11) -----------------------------------------------------------
logging:
  level:
    root: INFO
    com.circleguard: INFO
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}] "
