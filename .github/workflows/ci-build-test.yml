name: CI · Build & Test

on:
  push:
    branches: [dev, main, master]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "infra/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/dependabot.yml"
      - ".github/CODEOWNERS"
  pull_request:
    branches: [dev, main, master]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "infra/**"

concurrency:
  group: ci-build-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Gradle build & test (Java 21)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle (cached)
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build all microservices (no tests yet)
        run: ./gradlew clean assemble --no-daemon --stacktrace

      - name: Run tests
        run: ./gradlew test --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_id }}
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          retention-days: 7
          if-no-files-found: ignore
