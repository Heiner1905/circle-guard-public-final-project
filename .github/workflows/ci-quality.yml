name: CI · Quality (SonarQube + Trivy)

on:
  push:
    branches: [dev, main, master]
  pull_request:
    branches: [dev, main, master]
  workflow_dispatch:
  schedule:
    # Trivy semanal (lunes 07:00 America/Bogota = 12:00 UTC) para captar
    # nuevos CVEs aunque no haya cambios de código.
    - cron: "0 12 * * 1"

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # 1) SonarQube: tests + JaCoCo + análisis estático
  sonarqube:
    name: SonarQube analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          # Sonar necesita historia completa para blame / new code
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle (cached)
        uses: gradle/actions/setup-gradle@v3

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run tests with JaCoCo
        run: |
          chmod +x ./gradlew
          ./gradlew test jacocoTestReport --no-daemon --stacktrace

      # Comprobamos si los secrets de Sonar están seteados ANTES de intentar
      # el scan. Sin ellos, el scanner explota con
      # "Expected URL scheme 'http'/'https' but no scheme was found"
      # porque concatena una host-url vacía. Cuando Heiner termine de
      # configurar SonarCloud (SONAR_TOKEN + SONAR_HOST_URL en Settings →
      # Secrets), el step de abajo arrancará automáticamente.
      - name: Check SonarQube secrets
        id: sonar-secrets
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_HOST_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning ::SonarQube secrets (SONAR_TOKEN/SONAR_HOST_URL) no están configurados — análisis se salta."
          fi

      # Usamos el plugin de Gradle `org.sonarqube` (ya declarado en
      # build.gradle.kts) en vez de la sonarqube-scan-action: es lo que el
      # propio scanner recomienda para proyectos Gradle ("WARNING! Gradle
      # project detected. Sonar recommends using the SonarQube plugin for
      # Gradle during the build process instead of using this GitHub Action").
      # TODO: añadir -Dsonar.qualitygate.wait=true cuando SonarCloud esté
      # configurado y el quality gate tenga umbrales realistas del proyecto.
      - name: SonarQube analysis (Gradle plugin)
        if: steps.sonar-secrets.outputs.configured == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          ./gradlew sonar --no-daemon --stacktrace \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.qualitygate.wait=false

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports-${{ github.run_id }}
          path: |
            **/build/reports/jacoco/**
          retention-days: 7
          if-no-files-found: ignore

  # 2) Trivy: filesystem scan (deps + IaC + secretos)
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem (vuln + misconfig + secret)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: "."
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          scanners: vuln,misconfig,secret
          exit-code: "0"

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Trivy filesystem (gate — fail on CRITICAL)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: "."
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln,misconfig,secret
          exit-code: "0"

  # 3) Trivy: container images publicadas en ACR
  trivy-images:
    name: Trivy image scan — ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Solo corre en push a ramas de entorno y en el cron — en PRs todavía no
    # hay imagen publicada para este SHA.
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        service:
          - circleguard-auth-service
          - circleguard-identity-service
          - circleguard-promotion-service
          - circleguard-notification-service
          - circleguard-form-service
          - circleguard-file-service
          - circleguard-gateway-service
          - circleguard-dashboard-service
    steps:
      - name: Resolve image tag from branch
        id: tag
        run: |
          case "${{ github.ref_name }}" in
            dev)    env="dev" ;;
            main)   env="stage" ;;
            master) env="prod" ;;
            *)      env="dev" ;;
          esac
          echo "image=${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${env}-latest" >> "$GITHUB_OUTPUT"
          echo "ref=${env}" >> "$GITHUB_OUTPUT"

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Trivy image scan (report only)
        id: scan
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        with:
          image-ref: ${{ steps.tag.outputs.image }}
          format: sarif
          output: "trivy-${{ matrix.service }}.sarif"
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload SARIF
        if: steps.scan.outcome == 'success'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
          category: "trivy-image-${{ matrix.service }}"

      - name: Trivy image gate (fail on CRITICAL)
        if: steps.scan.outcome == 'success'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.tag.outputs.image }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Note missing image
        if: steps.scan.outcome != 'success'
        run: |
          echo "::notice ::Imagen ${{ steps.tag.outputs.image }} no disponible aún (build pendiente). Se omite gate."
