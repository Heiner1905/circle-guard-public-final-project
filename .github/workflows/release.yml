name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release (e.g. v1.2.3)
        required: true

permissions:
  contents: write
  packages: read

jobs:
  release:
    name: Build artifacts & publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle (cached)
        uses: gradle/actions/setup-gradle@v3

      - name: Build all service JARs
        run: |
          chmod +x ./gradlew
          ./gradlew clean assemble --no-daemon --stacktrace

      - name: Collect JAR artifacts
        run: |
          mkdir -p release-artifacts
          find services -path "*/build/libs/*.jar" -not -name "*-plain.jar" -exec cp {} release-artifacts/ \;
          ls -la release-artifacts/

      - name: Generate changelog (since previous tag)
        id: changelog
        run: |
          prev=$(git describe --tags --abbrev=0 "${{ steps.tag.outputs.tag }}^" 2>/dev/null || echo "")
          {
            echo "## Changes"
            echo ""
            if [ -n "$prev" ]; then
              git log --pretty=format:"- %s (%h)" "${prev}..${{ steps.tag.outputs.tag }}"
            else
              git log --pretty=format:"- %s (%h)" "${{ steps.tag.outputs.tag }}"
            fi
          } > CHANGELOG_RELEASE.md
          cat CHANGELOG_RELEASE.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: CircleGuard ${{ steps.tag.outputs.tag }}
          body_path: CHANGELOG_RELEASE.md
          files: release-artifacts/*.jar
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
