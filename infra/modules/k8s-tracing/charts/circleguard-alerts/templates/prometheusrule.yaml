apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: circleguard-microservices
  namespace: {{ .Release.Namespace }}
  labels:
    release: {{ .Values.releaseLabel | quote }}
    app.kubernetes.io/part-of: circleguard
    app.kubernetes.io/component: alerts
spec:
  groups:
    - name: circleguard.availability
      interval: 30s
      rules:
        - alert: CircleGuardServiceDown
          expr: |
            up{job=~"{{ .Values.serviceRegex }}"} == 0
          for: 2m
          labels:
            severity: critical
            project: circleguard
          annotations:
            summary: "CircleGuard service {{`{{ $labels.job }}`}} is down"
            description: |
              The Prometheus target {{`{{ $labels.job }}`}} ({{`{{ $labels.instance }}`}}) has been
              unreachable for more than 2 minutes. Check the deployment, the
              readiness probe, and recent rollouts.

    - name: circleguard.latency
      interval: 30s
      rules:
        - alert: CircleGuardHighErrorRate
          expr: |
            (
              sum by (application) (
                rate(http_server_requests_seconds_count{status=~"5..", application=~"{{ .Values.serviceRegex }}"}[5m])
              )
              /
              sum by (application) (
                rate(http_server_requests_seconds_count{application=~"{{ .Values.serviceRegex }}"}[5m])
              )
            ) > {{ .Values.thresholds.errorRate }}
          for: 5m
          labels:
            severity: warning
            project: circleguard
          annotations:
            summary: "High 5xx rate on {{`{{ $labels.application }}`}}"
            description: |
              5xx ratio is above {{ .Values.thresholds.errorRate }} sustained for 5 minutes
              on {{`{{ $labels.application }}`}} (current value {{`{{ $value | humanizePercentage }}`}}).

        - alert: CircleGuardHighLatencyP99
          expr: |
            histogram_quantile(
              0.99,
              sum by (le, application) (
                rate(http_server_requests_seconds_bucket{application=~"{{ .Values.serviceRegex }}"}[5m])
              )
            ) > {{ .Values.thresholds.latencyP99Seconds }}
          for: 5m
          labels:
            severity: warning
            project: circleguard
          annotations:
            summary: "p99 latency above {{ .Values.thresholds.latencyP99Seconds }}s on {{`{{ $labels.application }}`}}"
            description: |
              The 99th percentile latency on {{`{{ $labels.application }}`}} has been above
              {{ .Values.thresholds.latencyP99Seconds }}s for 5 minutes
              (current value {{`{{ $value | humanizeDuration }}`}}).
              Check downstream dependencies (DB, LDAP, Kafka) and trace samples in Jaeger.

    - name: circleguard.jvm
      interval: 60s
      rules:
        - alert: CircleGuardHighHeapUsage
          expr: |
            (
              sum by (application) (jvm_memory_used_bytes{application=~"{{ .Values.serviceRegex }}", area="heap"})
              /
              sum by (application) (jvm_memory_max_bytes{application=~"{{ .Values.serviceRegex }}", area="heap"})
            ) > {{ .Values.thresholds.heapUsageRatio }}
          for: 10m
          labels:
            severity: warning
            project: circleguard
          annotations:
            summary: "JVM heap > {{ .Values.thresholds.heapUsageRatio }} on {{`{{ $labels.application }}`}}"
            description: |
              Heap usage on {{`{{ $labels.application }}`}} stays above
              {{ .Values.thresholds.heapUsageRatio }} of the configured max for 10 minutes.
              Risk of GC thrashing — review memory limits or recent code paths.

        - alert: CircleGuardHighGCPause
          expr: |
            sum by (application) (
              rate(jvm_gc_pause_seconds_sum{application=~"{{ .Values.serviceRegex }}"}[5m])
            ) > 0.1
          for: 10m
          labels:
            severity: warning
            project: circleguard
          annotations:
            summary: "GC pause time > 100ms/s on {{`{{ $labels.application }}`}}"
            description: |
              Average GC pause time per second exceeds 100ms on
              {{`{{ $labels.application }}`}}, sustained for 10 minutes.
              Inspect heap allocations and recent traffic spikes.

    - name: circleguard.resilience
      interval: 30s
      rules:
        - alert: CircleGuardCircuitBreakerOpen
          expr: |
            max by (application, name) (
              resilience4j_circuitbreaker_state{state="open", application=~"{{ .Values.serviceRegex }}"}
            ) == 1
          for: 1m
          labels:
            severity: critical
            project: circleguard
          annotations:
            summary: "Circuit breaker {{`{{ $labels.name }}`}} is OPEN on {{`{{ $labels.application }}`}}"
            description: |
              The Resilience4j circuit breaker {{`{{ $labels.name }}`}} on
              {{`{{ $labels.application }}`}} has been in the OPEN state for more than 1 minute.
              Downstream calls are being short-circuited. Inspect the dependency and consider rollback.
