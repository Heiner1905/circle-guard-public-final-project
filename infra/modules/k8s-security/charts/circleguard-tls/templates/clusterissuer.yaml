{{- if eq .Values.issuer.kind "selfsigned" }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.issuer.name }}
  labels:
    app.kubernetes.io/part-of: circleguard
    circleguard.io/purpose: tls
spec:
  selfSigned: {}
{{- else if eq .Values.issuer.kind "acme" }}
{{- if not .Values.issuer.acme.email }}
{{- fail "issuer.acme.email is required when issuer.kind=acme" }}
{{- end }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.issuer.name }}
  labels:
    app.kubernetes.io/part-of: circleguard
    circleguard.io/purpose: tls
spec:
  acme:
    email: {{ .Values.issuer.acme.email | quote }}
    server: {{ .Values.issuer.acme.server | quote }}
    privateKeySecretRef:
      name: {{ printf "%s-account-key" .Values.issuer.name }}
    solvers:
      - http01:
          ingress:
            class: {{ .Values.issuer.acme.ingressClass | quote }}
{{- else }}
{{- fail (printf "Unknown issuer kind %q (expected selfsigned or acme)" .Values.issuer.kind) }}
{{- end }}
