{{- range $serviceName, $service := .Values.services }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $service.fullName }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "circleguard.serviceLabels" (dict "root" $ "serviceName" $serviceName "service" $service) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ $service.fullName }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
  ports:
    - name: http
      port: {{ $service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
