{{- if .Values.global.ingress.enabled }}
{{- $root := . }}
{{- range $serviceName, $service := .Values.services }}
{{- if $service.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $service.fullName }}
  namespace: {{ $root.Values.global.namespace }}
  labels:
    {{- include "circleguard.serviceLabels" (dict "root" $root "serviceName" $serviceName "service" $service) | nindent 4 }}
spec:
  ingressClassName: {{ $root.Values.global.ingress.className }}
  {{- with $root.Values.global.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ $root.Values.global.ingress.host }}
      http:
        paths:
          - path: {{ $service.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ $service.fullName }}
                port:
                  name: http
{{- end }}
{{- end }}
{{- end }}
